<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupplyChain AI - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #dbe9ff 0%, #e8f1ff 50%, #f0f5ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .header { text-align: center; margin-bottom: 40px; animation: fadeIn 0.3s ease; }
        .header h1 { font-size: 48px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
        .header p { font-size: 18px; color: #6b7280; }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 540px;
            padding: 48px 56px;
            animation: fadeIn 0.4s ease;
        }
        .card-title { font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
        .card-subtitle { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
        .form-group input {
            width: 100%; height: 48px; padding: 12px 16px;
            font-size: 15px; font-family: 'Inter', sans-serif;
            color: #1a1a1a; background: #fff;
            border: 1px solid #d1d5db; border-radius: 8px;
            transition: all 0.2s; outline: none;
        }
        .form-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .form-group input::placeholder { color: #9ca3af; }

        /* Role selector */
        .role-label { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; display: block; }
        .role-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .role-card {
            flex: 1; padding: 14px 8px; border: 2px solid #e5e7eb;
            border-radius: 10px; text-align: center; cursor: pointer;
            transition: all 0.2s; background: #f9fafb;
        }
        .role-card:hover { border-color: #93c5fd; background: #eff6ff; }
        .role-card.selected { border-color: #3b82f6; background: #eff6ff; }
        .role-card .icon { font-size: 24px; margin-bottom: 6px; }
        .role-card .role-name { font-size: 13px; font-weight: 600; color: #374151; }
        .role-card.selected .role-name { color: #1d4ed8; }

        .error-box {
            color: #dc2626; font-size: 13px; font-weight: 500;
            padding: 10px 14px; background: #fef2f2;
            border: 1px solid #fecaca; border-radius: 8px;
            margin-bottom: 16px; display: none;
        }
        .success-box {
            color: #16a34a; font-size: 13px; font-weight: 500;
            padding: 10px 14px; background: #f0fdf4;
            border: 1px solid #bbf7d0; border-radius: 8px;
            margin-bottom: 16px; display: none;
        }
        .submit-btn {
            width: 100%; height: 48px; background: #3b82f6;
            color: #fff; font-size: 16px; font-weight: 600;
            border: none; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .submit-btn:hover:not(:disabled) { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
        .submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }
        .footer-link { text-align: center; margin-top: 24px; font-size: 14px; color: #6b7280; }
        .footer-link a { color: #3b82f6; font-weight: 600; text-decoration: none; }
        .footer-link a:hover { color: #2563eb; text-decoration: underline; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) {
            .header h1 { font-size: 36px; }
            .card { padding: 32px 24px; }
            .role-grid { gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SupplyChain AI</h1>
        <p>AI-Powered Supplier Risk Management</p>
    </div>

    <div class="card">
        <h2 class="card-title">Create Account</h2>
        <p class="card-subtitle">Register to get started with SupplyChain AI</p>

        <div id="errorBox" class="error-box"></div>
        <div id="successBox" class="success-box"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password (min 6 characters)" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
            </div>

            <span class="role-label">Select Your Role</span>
            <div class="role-grid">
                <div class="role-card" data-role="seller">
                    <div class="icon">🏪</div>
                    <div class="role-name">Seller</div>
                </div>
                <div class="role-card selected" data-role="manufacturer">
                    <div class="icon">🏭</div>
                    <div class="role-name">Manufacturer</div>
                </div>
                <div class="role-card" data-role="admin">
                    <div class="icon">🛡️</div>
                    <div class="role-name">Admin</div>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
        </form>

        <p class="footer-link">Already have an account? <a href="login.html">Sign In</a></p>
    </div>

    <script>
        let selectedRole = "manufacturer";

        // Role card selection
        document.querySelectorAll(".role-card").forEach(card => {
            card.addEventListener("click", function () {
                document.querySelectorAll(".role-card").forEach(c => c.classList.remove("selected"));
                this.classList.add("selected");
                selectedRole = this.dataset.role;
            });
        });

        function showError(msg) {
            const box = document.getElementById("errorBox");
            box.textContent = msg;
            box.style.display = "block";
            document.getElementById("successBox").style.display = "none";
        }

        function showSuccess(msg) {
            const box = document.getElementById("successBox");
            box.textContent = msg;
            box.style.display = "block";
            document.getElementById("errorBox").style.display = "none";
        }

        function hideMessages() {
            document.getElementById("errorBox").style.display = "none";
            document.getElementById("successBox").style.display = "none";
        }

        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            hideMessages();

            const fullName        = document.getElementById("fullName").value.trim();
            const email           = document.getElementById("email").value.trim();
            const password        = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const btn             = document.getElementById("submitBtn");

            // Validations
            if (!fullName) { showError("Please enter your full name."); return; }
            if (!email)    { showError("Please enter your email."); return; }
            if (password.length < 6) { showError("Password must be at least 6 characters."); return; }
            if (password !== confirmPassword) { showError("Passwords do not match. Please try again."); return; }

            btn.disabled    = true;
            btn.textContent = "Creating account...";

            try {
                const response = await fetch("http://127.0.0.1:5000/register", {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({
                        email:     email,
                        password:  password,
                        full_name: fullName,
                        role:      selectedRole
                    })
                });

                const data = await response.json();

                if (data.status === "success") {
                    showSuccess("✅ Account created successfully! Redirecting to sign in...");
                    btn.textContent = "✓ Done!";
                    setTimeout(() => { window.location.href = "login.html"; }, 2000);
                } else {
                    showError(data.message || "Registration failed. Please try again.");
                    btn.disabled    = false;
                    btn.textContent = "Create Account";
                }

            } catch (err) {
                showError("❌ Cannot connect to server. Make sure backend is running: python -m uvicorn main:app --reload --port 5000");
                btn.disabled    = false;
                btn.textContent = "Create Account";
            }
        });
    </script>
</body>
</html>
